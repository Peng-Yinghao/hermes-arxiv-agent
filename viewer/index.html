<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Agent Memory Papers Viewer</title>
  <meta name="theme-color" content="#f7f5ef">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <!-- Cloudflare Web Analytics -->
  <script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "__CF_TOKEN_PLACEHOLDER__"}'></script>
  <!-- End Cloudflare Web Analytics -->
</head>
<body>
  <div class="bg-shape bg-shape-a"></div>
  <div class="bg-shape bg-shape-b"></div>

  <header class="topbar">
    <div class="brand">
      <div class="brand-dot"></div>
      <div>
        <h1>Agent Memory 论文阅读器</h1>
        <p id="metaText">加载中...</p>
      </div>
    </div>
    <button id="settingsBtn" class="settings-btn" title="设置">⚙</button>
  </header>

  <main class="container">
    <section class="filters">
      <!-- Row 1: date controls + quick range + actions -->
      <div class="field date-mode-field">
        <label for="dateMode">日期维度</label>
        <select id="dateMode">
          <option value="crawled_date">抓取日期</option>
          <option value="published_date">发表日期</option>
        </select>
      </div>
      <div class="field start-date-field">
        <label for="startDate">开始日期</label>
        <input id="startDate" type="date">
      </div>
      <div class="field end-date-field">
        <label for="endDate">结束日期</label>
        <input id="endDate" type="date">
      </div>
      <div class="field quick-range-field">
        <label>快捷时间</label>
        <div class="quick-range" id="quickRange">
          <button type="button" class="btn" data-range="today">今天</button>
          <button type="button" class="btn" data-range="3d">过去 3 天</button>
          <button type="button" class="btn" data-range="7d">过去 1 周</button>
          <button type="button" class="btn" data-range="all">全部</button>
        </div>
      </div>
      <div class="actions">
        <button id="applyBtn" class="btn btn-primary">筛选</button>
        <button id="resetBtn" class="btn">重置</button>
      </div>

      <!-- Row 2: keyword search (full width) -->
      <div class="field search-field">
        <label for="keyword">关键词</label>
        <input id="keyword" type="text" placeholder="搜索标题、作者、摘要...">
      </div>

      <!-- Row 3: 3D classification filters -->
      <div class="field scene-field">
        <label for="sceneFilter">应用场景</label>
        <select id="sceneFilter">
          <option value="">全部</option>
          <option>个人助手</option><option>代码Agent</option><option>Web Agent</option>
          <option>具身Agent</option><option>多智能体模拟</option><option>通用/其他</option>
        </select>
      </div>
      <div class="field form-field">
        <label for="formFilter">记忆形式</label>
        <select id="formFilter">
          <option value="">全部</option>
          <option>文本</option><option>向量</option><option>结构化</option>
          <option>参数化</option><option>潜变量</option><option>混合/其他</option>
        </select>
      </div>
      <div class="field memtype-field">
        <label for="memTypeFilter">记忆类型</label>
        <select id="memTypeFilter">
          <option value="">全部</option>
          <option>上下文/摘要型</option><option>检索型</option><option>反思经验型</option>
          <option>分层管理型</option><option>结构化图谱型</option><option>参数/潜变量型</option>
          <option>其他</option>
        </select>
      </div>

      <!-- Row 4: binary toggle filters -->
      <div class="field favorite-only-field">
        <label for="favoriteOnly">收藏</label>
        <label class="switch-label">
          <input id="favoriteOnly" type="checkbox">
          <span>只看收藏</span>
        </label>
      </div>
      <div class="field show-deleted-field">
        <label for="showDeleted">已删除</label>
        <label class="switch-label">
          <input id="showDeleted" type="checkbox">
          <span>显示已删除</span>
        </label>
      </div>
      <div class="field peer-review-field">
        <label for="peerReviewOnly">同行评议</label>
        <label class="switch-label">
          <input id="peerReviewOnly" type="checkbox">
          <span>仅看同行评议</span>
        </label>
      </div>
      <div class="field review-only-field">
        <label for="reviewOnly">精读</label>
        <label class="switch-label">
          <input id="reviewOnly" type="checkbox">
          <span>仅看有精读</span>
        </label>
      </div>
    </section>

    <section class="summary" id="summary"></section>
    <section class="cards" id="cards"></section>
  </main>

  <template id="paperTpl">
    <article class="card">
      <div class="card-head">
        <span class="pill"></span>
        <a class="title" target="_blank" rel="noopener noreferrer"></a>
        <button class="delete-btn" type="button" aria-label="删除" title="删除此论文">✕</button>
      </div>
      <div class="card-actions">
        <button class="favorite-btn" type="button" aria-label="收藏">☆ 收藏</button>
        <button class="md-btn" type="button" aria-label="Markdown全文" title="查看全文 Markdown (arxiv2md)">MD</button>
        <button class="review-btn" type="button" aria-label="AI精读" title="AI 精读分析（不同 LLM 生成）">🤖 精读</button>
      </div>
      <div class="meta"></div>
      <div class="tags"></div>
      <div class="section">
        <h3>中文总结</h3>
        <p class="summary-cn"></p>
      </div>
      <details>
        <summary>查看 Abstract</summary>
        <p class="abstract"></p>
      </details>
    </article>
  </template>

  <script src="app.js"></script>

  <div class="md-modal" id="mdModal" style="display:none">
    <div class="md-modal-box">
      <div class="md-modal-head">
        <span id="mdModalTitle"></span>
        <button id="mdModalClose" class="md-modal-close">&times;</button>
      </div>
      <div class="md-modal-body" id="mdModalBody"></div>
      <div class="md-modal-foot">
        <button id="mdCopyBtn" class="btn">📋 复制 Markdown</button>
        <button id="mdRawBtn" class="btn">查看源码</button>
      </div>
    </div>
  </div>

  <div class="review-modal" id="reviewModal" style="display:none">
    <div class="review-modal-box">
      <div class="review-modal-head">
        <span id="reviewModalTitle"></span>
        <button id="reviewModalClose" class="review-modal-close">&times;</button>
      </div>
      <div class="review-modal-body" id="reviewModalBody"></div>
      <div class="review-modal-foot">
        <button id="reviewCopyBtn" class="btn">📋 复制精读</button>
        <button id="reviewRawBtn" class="btn">查看源码</button>
      </div>
    </div>
  </div>
</body>
</html>
