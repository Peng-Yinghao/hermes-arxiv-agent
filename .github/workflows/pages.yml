name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "viewer/**"
      - "markdown_full/**"
      - "deleted_ids.txt"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Inject Cloudflare Analytics token
        run: |
          sed -i "s/__CF_TOKEN_PLACEHOLDER__/${{ secrets.CF_ANALYTICS_TOKEN }}/" viewer/index.html

      - name: Copy markdown_full into viewer
        run: |
          if [ -d markdown_full ]; then
            cp -r markdown_full viewer/markdown_full
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: viewer

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
